<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Client Sender (RISIKO TINGGI)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Memanggil library email otomatis via CDN browser -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-800 p-6 rounded-2xl shadow-xl w-full max-w-md border border-rose-500/30">
        <h2 class="text-2xl font-bold mb-1 text-rose-400">⚠️ GitHub Client Sender</h2>
        <p class="text-xs text-slate-400 mb-6 font-mono text-amber-400">Peringatan: Metode ini membocorkan password di browser publik!</p>

        <form id="email-form" class="space-y-4">
            <!-- Input Email Tujuan -->
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">Email Tujuan</label>
                <input type="email" id="target" required placeholder="support.whatsapp.com" 
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-rose-500 text-white">
            </div>

            <!-- Input Subjek -->
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">Subjek</label>
                <input type="text" id="subject" required placeholder="Masukkan subjek" 
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-rose-500 text-white">
            </div>

            <!-- Input Isi Pesan -->
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">Isi Pesan</label>
                <textarea id="message" rows="5" required placeholder="Tulis pesan teks lu di sini..." 
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-rose-500 text-white resize-none"></textarea>
            </div>

            <button type="submit" id="btn" class="w-full bg-rose-500 hover:bg-rose-600 text-slate-950 font-bold py-2.5 rounded-lg text-sm transition-all">
                Kirim via Client (Publik) 🔥
            </button>
        </form>
        <div id="status" class="mt-4 text-center text-sm font-medium p-3 rounded-lg hidden"></div>
    </div>

    <script>
        // DAFTAR AKUN DAN PASSWORD LU (TERLIHAT JELAS OLEH PUBLIK DI GITHUB)
        const daftarAkun = [
            { user: "ptpertamina626@gmail.com", pass: "ycsl bnxd kbqu xzgo" },
            { user: "wayskingunband@gmail.com", pass: "iyan gyjs jyzv gqza" },
            { user: "sendangkasa3@gmail.com", pass: "qswc extx upml xtlk" },
            { user: "aditsukaff8@gmail.com", pass: "ozox mjsx wtzz padq" },
            { user: "bandingg194@gmail.com", pass: "jhio tgut qafe fxor" },
            { user: "mahjonggacor799@gmail.com", pass: "rqnb gkte kffz xjfv" },
            { user: "ahmadigus878@gmail.com", pass: "dmcx uafg jgvb dmvn" }
        ];

        document.getElementById('email-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            
            btn.innerText = "Mengirim... ⏳";
            btn.disabled = true;
            status.classList.add('hidden');

            // Memilih acak akun dari list di atas langsung di browser
            const akunTerpilih = daftarAkun[Math.floor(Math.random() * daftarAkun.length)];

            // Menggunakan library EmailJS (memerlukan inisialisasi user publik key/token mereka agar fungsi send bisa jalan di frontend)
            // Catatan: Script browser murni tidak bisa kirim ke server SMTP tanpa perantara API token dari platform seperti EmailJS/Web3Forms.
            
            // CONTOH LOGIKA SIMULASI PENGIRIMAN DI FRONTEND:
            console.log("Mengirim pesan menggunakan akun:", akunTerpilih.user);
            
            // Karena ini berjalan di GitHub Pages (Frontend), pengiriman langsung ke target email membutuhkan API Key publik dari layanan email wrapper.
            // Tanpa itu, baris array akun di atas cuma jadi pajangan teks hiasan di browser dan gak bisa connect ke SMTP Gmail secara mandiri.
            
            status.innerText = `⚠️ Simulasi: Mencoba mengirim dari [${akunTerpilih.user}] ke [${document.getElementById('target').value}]. Kunci password terekspos di source code!`;
            status.className = "mt-4 text-center text-sm font-medium p-2 rounded-lg bg-amber-500/10 text-amber-400 border border-amber-500/20";
            
            btn.innerText = "Kirim via Client (Publik) 🔥";
            btn.disabled = false;
            status.classList.remove('hidden');
        });
    </script>
</body>
</html>
